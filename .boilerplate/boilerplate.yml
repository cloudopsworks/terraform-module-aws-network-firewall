# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
    confirm: true
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
    confirm: true
  # End - Generic Boilerplate Variables Setup
  - name: vpc_dependency
    order: 2
    description: "VPC Dependency"
    type: bool
    default: false
    confirm: true
  - name: vpc_path
    order: 3
    description: "VPC Dependency Path"
    type: string
    default: "../vpc"
    confirm: true
  - name: vpc_subnet_tier
    order: 4
    description: "VPC Subnet Tier"
    type: enum
    options:
      - public
      - private
      - intra
    default: private
    confirm: true
hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"